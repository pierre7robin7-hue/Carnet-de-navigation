<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
  // Chargement séquentiel des modules JSX, transpilés en mémoire avec le runtime
  // React "classic" (React.createElement) : le runtime "automatic" par défaut
  // injecterait un `import` ES module, invalide en script classique.
  (async function boot() {
    const files = [
      './src/00-ports.jsx', './src/00a-supabase.jsx', './src/01-utils.jsx', './src/02-store.jsx', './src/03-icons.jsx',
      './src/04-components.jsx', './src/04b-page-login.jsx', './src/05-page-dashboard.jsx', './src/06-page-history.jsx',
      './src/07-page-detail.jsx', './src/08-page-form.jsx', './src/09-page-map.jsx', './src/09b-page-export.jsx', './src/10-app.jsx',
    ];
    const rootEl = document.getElementById('root');
    try {
      const sources = await Promise.all(files.map((file) => fetch(file, { cache: 'no-store' }).then((res) => {
        if (!res.ok) throw new Error(`${file} : HTTP ${res.status}`);
        return res.text();
      })));
      // Un seul appel Babel/eval sur la concaténation : garantit que toutes les
      // déclarations top-level (const/let) partagent la même portée lexicale.
      const combined = sources.join('\n;\n');
      const { code } = Babel.transform(combined, {
        presets: [['react', { runtime: 'classic' }]],
        sourceType: 'script',
      });
      (0, eval)(code);
    } catch (err) {
      console.error('Erreur au chargement de l’application', err);
      rootEl.innerHTML = `<div style="max-width:640px;margin:80px auto;padding:24px;font-family:sans-serif;color:#d14f33;background:#fff;border-radius:12px">
        <strong>Erreur au chargement :</strong><br/>${(err && err.message) || err}
      </div>`;
    }
  })();

  // Installation sur iPhone / accès hors-ligne de base : enregistré après le
  // chargement pour ne jamais retarder le premier affichage de l'app.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch((err) => {
        console.error('Enregistrement du service worker impossible', err);
      });
    });
  }
</script>
